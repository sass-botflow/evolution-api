name: botflow-evolution

# EasyPanel: paste this file as-is, then replace PASTE_YOUR_KEY_HERE and PASTE_PASSWORD.
# Do NOT use ${VAR} syntax — EasyPanel breaks on interpolation.
# Leave Environment tab empty (or delete all vars there).

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: botflow_evolution_api
    restart: unless-stopped
    depends_on:
      evolution-redis:
        condition: service_healthy
    environment:
      SERVER_URL: https://evolution.api.botflow.ink
      SERVER_PORT: "8080"
      AUTHENTICATION_API_KEY: PASTE_YOUR_KEY_HERE
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://botflow:PASTE_PASSWORD@sass-botflow_postgres:5432/evolution?schema=evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: botflow_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/1
      CACHE_REDIS_PREFIX_KEY: botflow_evolution
      WEBSOCKET_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LOG_LEVEL: ERROR,WARN,INFO
      LANGUAGE: en
    volumes:
      - evolution_instances:/evolution/instances
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  evolution-redis:
    image: redis:7-alpine
    container_name: botflow_evolution_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  evolution_instances:
    name: botflow_evolution_instances
  evolution_redis_data:
    name: botflow_evolution_redis_data
