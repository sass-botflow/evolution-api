name: botflow-evolution

# BotFlow production Evolution API — multi-tenant SaaS (Qunvert-style)
# Deploy: EasyPanel → Compose → paste this file → Environment tab EMPTY → Deploy
# Domain: evolution.api.botflow.ink → port 8080 (TLS via Cloudflare / Traefik)

services:
  evolution-db-init:
    image: postgres:16-alpine
    container_name: botflow_evolution_db_init
    restart: "no"
    environment:
      PGUSER: botflow
      PGPASSWORD: botflow
      PGHOST: sass-botflow_postgres
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Postgres at $$PGHOST..."
        until pg_isready -h "$$PGHOST" -U "$$PGUSER" -d postgres; do sleep 2; done
        EXISTS=$$(psql -h "$$PGHOST" -U "$$PGUSER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='evolution'")
        if [ "$$EXISTS" != "1" ]; then
          psql -h "$$PGHOST" -U "$$PGUSER" -d postgres -c "CREATE DATABASE evolution;"
          echo "Database evolution created."
        else
          echo "Database evolution already exists."
        fi
        psql -h "$$PGHOST" -U "$$PGUSER" -d evolution -c "CREATE SCHEMA IF NOT EXISTS evolution_api;"
        echo "DB init done."

  evolution-redis:
    image: redis:7-alpine
    container_name: botflow_evolution_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 128M

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: botflow_evolution_api
    restart: unless-stopped
    depends_on:
      evolution-db-init:
        condition: service_completed_successfully
      evolution-redis:
        condition: service_healthy
    environment:
      # ── Server ──────────────────────────────────────────────────────────
      SERVER_NAME: botflow-evolution
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      SERVER_URL: https://evolution.api.botflow.ink
      SERVER_DISABLE_DOCS: "true"
      SERVER_DISABLE_MANAGER: "true"

      # ── CORS (internal only — QR never served from browser → Evolution) ─
      CORS_ORIGIN: https://api.botflow.ink
      CORS_METHODS: POST,GET,PUT,DELETE
      CORS_CREDENTIALS: "false"

      # ── Auth (API key — backend uses same value as EVOLUTION_API_KEY) ───
      AUTHENTICATION_API_KEY: e323292ec09f14a66514089b993e246eb469f3a04448ddc02167447e76621f18
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"

      # ── PostgreSQL (multi-tenant instance metadata + message history) ───
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://botflow:botflow@sass-botflow_postgres:5432/evolution?schema=evolution_api&connection_limit=25&pool_timeout=30
      DATABASE_CONNECTION_CLIENT_NAME: botflow_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP_DAYS: "7"
      DATABASE_DELETE_MESSAGE: "false"

      # ── Redis (session cache, reconnect, auto-restore) ───────────────────
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/1
      CACHE_REDIS_PREFIX_KEY: botflow_evolution
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "true"
      CACHE_LOCAL_TTL: "86400"

      # ── Global webhook → BotFlow backend (tenant routing by instance) ─
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: https://api.botflow.ink/webhooks/evolution
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_PRESENCE_UPDATE: "true"
      WEBHOOK_EVENTS_APPLICATION_STARTUP: "false"
      WEBHOOK_EVENTS_INSTANCE_CREATE: "false"
      WEBHOOK_EVENTS_INSTANCE_DELETE: "false"
      WEBHOOK_REQUEST_TIMEOUT_MS: "30000"
      WEBHOOK_RETRY_MAX_ATTEMPTS: "10"
      WEBHOOK_RETRY_INITIAL_DELAY_SECONDS: "5"
      WEBHOOK_RETRY_USE_EXPONENTIAL_BACKOFF: "true"
      WEBHOOK_RETRY_MAX_DELAY_SECONDS: "300"

      # ── WebSocket (backend-only; hosts restricted) ───────────────────────
      WEBSOCKET_ENABLED: "true"
      WEBSOCKET_GLOBAL_EVENTS: "true"
      WEBSOCKET_ALLOWED_HOSTS: api.botflow.ink,sass-botflow_backend,backend

      # ── Session / QR (QR via webhook only — not public manager) ─────────
      CONFIG_SESSION_PHONE_CLIENT: BotFlow
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: "6"
      QRCODE_COLOR: "#6366f1"
      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "true"

      # ── Logs & memory ───────────────────────────────────────────────────
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_BAILEYS: error
      LOG_COLOR: "false"
      LANGUAGE: en
      EVENT_EMITTER_MAX_LISTENERS: "50"
      NODE_OPTIONS: --max-old-space-size=1536

      # ── Telemetry off in production ─────────────────────────────────────
      TELEMETRY_ENABLED: "false"
      PROMETHEUS_METRICS: "false"

    volumes:
      - evolution_instances:/evolution/instances
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  evolution_instances:
    name: botflow_evolution_instances
  evolution_redis_data:
    name: botflow_evolution_redis_data
